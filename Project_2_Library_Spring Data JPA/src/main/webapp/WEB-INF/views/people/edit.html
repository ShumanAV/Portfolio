<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update person</title>
</head>
<body>

    <h1>Страница изменения человека</h1>
    <br>
    <br>

    <form th:method="PATCH" th:action="@{/people/{id}(id=${person.id})}" th:object="${person}">
        <label for="name">Введите ФИО: </label>
        <input type="text" th:field="*{name}" id="name">
        <div style="color:red" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Name Error</div>

        <br>

        <label for="yearOfBirth">Введите год рождения: </label>
        <input type="text" th:field="*{yearOfBirth}" id="yearOfBirth">
        <div style="color:red" th:if="${#fields.hasErrors('yearOfBirth')}" th:errors="*{yearOfBirth}">Year of birth Error</div>

        <br>
        <br>

        <input type="submit" value="Редактировать!"/>
    </form>

    <br/>
    <a href="/people">Назад </a>

</body>
</html>
