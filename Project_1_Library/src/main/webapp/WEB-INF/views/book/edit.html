<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update book</title>
</head>
<body>

    <h1>Страница изменения книги</h1>
    <br>
    <br>

    <form th:method="PATCH" th:action="@{/books/{id}(id=${book.book_id})}" th:object="${book}">
        <label for="title">Введите название книги: </label>
        <input type="text" th:field="*{title}" id="title">
        <div style="color:red" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">Title Error</div>

        <br>

        <label for="author">Введите автора: </label>
        <input type="text" th:field="*{author}" id="author">
        <div style="color:red" th:if="${#fields.hasErrors('author')}" th:errors="*{author}">Author Error</div>

        <br>

        <label for="year_of_writing">Введите год написания книги: </label>
        <input type="text" th:field="*{year_of_writing}" id="year_of_writing">
        <div style="color:red" th:if="${#fields.hasErrors('year_of_writing')}" th:errors="*{year_of_writing}">Year of writing Error</div>

        <br>
        <br>

        <input type="submit" value="Редактировать!"/>
    </form>

</body>
</html>
